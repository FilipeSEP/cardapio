<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corujinha Pães & Bolos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=DM+Sans:wght@300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cream: #fef7ff;
            --warm: #fdf2f8;
            --parchment: #f0e6f6;
            --mocha: #7e22a0;
            --espresso: #4a044e;
            --caramel: #c026d3;
            --rose: #e879f9;
            --sage: #a855f7;
            --plum: #7c3aed;
            --ink: #3b0764;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #fef7ff, #fdf2f8);
            color: var(--ink);
            min-height: 100vh;
        }

        /* --- HERO --- */
        .hero {
            position: relative;
            background: linear-gradient(135deg, #4a044e, #701a75);
            overflow: hidden;
            padding: 4rem 2rem 3rem;
            text-align: center;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 30% 60%, rgba(192,38,211,0.3) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(232,121,249,0.2) 0%, transparent 50%);
        }

        .hero-inner { position: relative; z-index: 1; }

        .logo-ring {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: var(--cream);
            border: 3px solid #f0abfc;
            margin: 0 auto 1.5rem;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-ring img { width: 100%; height: 100%; object-fit: cover; }
        .logo-ring .owl-fallback { font-size: 3rem; }

        .hero-eyebrow {
            font-family: 'Pinyon Script', cursive;
            font-size: 1.4rem;
            color: var(--caramel);
            letter-spacing: 0.02em;
            margin-bottom: 0.25rem;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 700;
            color: var(--cream);
            line-height: 1.1;
            letter-spacing: -0.01em;
        }

        .hero-title em {
            font-style: italic;
            color: var(--caramel);
        }

        .hero-sub {
            font-size: 0.95rem;
            color: rgba(253,248,240,0.65);
            margin-top: 0.75rem;
            font-weight: 300;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .hero-divider {
            width: 60px;
            height: 1px;
            background: var(--caramel);
            margin: 1.5rem auto;
            opacity: 0.6;
        }

        /* --- FILTERS --- */
        .filters-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--espresso);
            border-bottom: 1px solid rgba(192,38,211,0.3);
            padding: 0.75rem 1.5rem;
            overflow-x: auto;
            display: flex;
            gap: 0.5rem;
            scrollbar-width: none;
        }

        .filters-bar::-webkit-scrollbar { display: none; }

        .filter-btn {
            white-space: nowrap;
            padding: 0.4rem 1.1rem;
            border-radius: 2rem;
            border: 1px solid rgba(192,38,211,0.4);
            background: transparent;
            color: rgba(253,248,240,0.7);
            font-size: 0.8rem;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.03em;
        }

        .filter-btn:hover { border-color: var(--caramel); color: var(--cream); }

        .filter-btn.active {
            background: var(--caramel);
            border-color: var(--caramel);
            color: var(--espresso);
            font-weight: 500;
        }

        /* --- MAIN --- */
        .main { max-width: 1200px; margin: 0 auto; padding: 3rem 1.5rem; }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--espresso);
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .section-sub {
            font-size: 0.85rem;
            color: var(--mocha);
            margin-bottom: 2rem;
            font-weight: 300;
        }

        /* --- GRID --- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.25rem;
        }

        /* --- CARD --- */
        .card {
            background: #fff;
            border-radius: 16px;
            border: 1px solid var(--parchment);
            padding: 1.4rem 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--cat-color, var(--caramel));
            border-radius: 16px 16px 0 0;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(74,4,78,0.12);
            border-color: var(--cat-color, var(--parchment));
        }

        .card-cat {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--cat-color, var(--caramel));
            margin-bottom: 0.6rem;
        }

        .card-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 500;
            color: var(--espresso);
            line-height: 1.3;
            margin-bottom: 0.4rem;
        }

        .card-desc {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.5rem;
            font-weight: 300;
        }

        .flavors {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            margin: 0.5rem 0;
        }

        .flavor-pill {
            font-size: 0.68rem;
            padding: 0.2rem 0.65rem;
            border-radius: 2rem;
            background: #f5eeff;
            color: var(--mocha);
            border: 1px solid #e0c8f0;
        }

        .card-footer {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid #f0e6f6;
        }

        .price {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--espresso);
        }

        .price span {
            font-size: 0.75rem;
            font-weight: 400;
            font-family: 'DM Sans', sans-serif;
            color: var(--mocha);
            margin-right: 0.15rem;
        }

        .card-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.15rem;
        }

        .meta-tag {
            font-size: 0.7rem;
            color: #aaa;
            text-align: right;
        }

        /* --- EMPTY STATE --- */
        .empty {
            grid-column: 1/-1;
            text-align: center;
            padding: 4rem 2rem;
            color: var(--mocha);
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.1rem;
        }

        /* --- FOOTER --- */
        footer {
            background: var(--espresso);
            color: rgba(253,248,240,0.5);
            text-align: center;
            padding: 2.5rem 1.5rem;
            font-size: 0.8rem;
            letter-spacing: 0.04em;
        }

        footer strong {
            display: block;
            font-family: 'Pinyon Script', cursive;
            font-size: 1.8rem;
            color: var(--caramel);
            font-weight: 400;
            margin-bottom: 0.4rem;
        }

        /* --- CAT COLORS --- */
        .cat-paes       { --cat-color: #c026d3; }
        .cat-bsimples   { --cat-color: #7c3aed; }
        .cat-bvulcao    { --cat-color: #db2777; }
        .cat-tsalgadas  { --cat-color: #059669; }
        .cat-tdoces     { --cat-color: #e11d91; }
        .cat-brecheados { --cat-color: #7c3aed; }
        .cat-outros     { --cat-color: #9333ea; }
        .cat-esfiha     { --cat-color: #d97706; }
        .cat-cuscuz     { --cat-color: #dc2626; }

        @media (max-width: 600px) {
            .hero { padding: 3rem 1.25rem 2rem; }
            .hero-title { font-size: 2.2rem; }
            .main { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>

<header class="hero">
    <div class="hero-inner">
        <div class="logo-ring">
            <img src="https://filipesep.github.io/cardapio/img/logo.png" alt="Logo Corujinha" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
            <span class="owl-fallback" style="display:none">🦉</span>
        </div>
        <p class="hero-eyebrow">bem-vindo à</p>
        <h1 class="hero-title">Corujinha <em>Pães</em><br>& <em>Bolos</em></h1>
        <div class="hero-divider"></div>
        <p class="hero-sub">Confeitaria artesanal · Feito com carinho</p>
    </div>
</header>

<nav class="filters-bar" id="filters"></nav>

<main class="main">
    <h2 class="section-title">Nosso Cardápio</h2>
    <p class="section-sub">Ingredientes selecionados, receitas com amor. Filtre por categoria.</p>
    <div class="menu-grid" id="grid"></div>
</main>

<footer>
    <strong>Corujinha Pães & Bolos</strong>
    Confeitaria Artesanal · Doces que transformam momentos
</footer>

<script>
const menuData = [
    { name: 'Pão simples', category: 'Pães caseiros', price: 20.00 },
    { name: 'Fatia Húngaras', category: 'Pães caseiros', price: 6.00, flavors: ['Chocolate granulado', 'Coco'] },
    { name: 'Pão recheado', category: 'Pães caseiros', price: 40.00, description: 'Delicioso pão caseiro recheado', flavors: ['Calabresa', 'Bauru'] },
    { name: 'Bolo de Milho', category: 'Bolos simples', price: 50.00, portions: 16 },
    { name: 'Bolo de Fubá', category: 'Bolos simples', price: 50.00, portions: 16 },
    { name: 'Bolo Fubá c/ goiabada', category: 'Bolos simples', price: 60.00, portions: 16 },
    { name: 'Bolo Cocada invertida', category: 'Bolos simples', price: 60.00, portions: 16 },
    { name: 'Bolo de Chocolate', category: 'Bolos simples', price: 60.00, portions: 16 },
    { name: 'Bolo de Cenoura com Chocolate Crocante', category: 'Bolos simples', price: 60.00, portions: 24 },
    { name: 'Bolo Mesclado', category: 'Bolos simples', price: 60.00, portions: 16 },
    { name: 'Bolo Formigueiro', category: 'Bolos simples', price: 55.00, portions: 16 },
    { name: 'Bolo Laranja c/ casca', category: 'Bolos simples', price: 60.00, portions: 16 },
    { name: 'Bolo Queijadinha', category: 'Bolos simples', price: 65.00, portions: 16 },
    { name: 'Bolo Fubá Cremoso', category: 'Bolos simples', price: 60.00, portions: 16 },
    { name: 'Bolo Cenoura Vulcão', category: 'Bolos vulcão', price: 75.00 },
    { name: 'Torta de Frango G', category: 'Tortas salgadas', price: 95.00 },
    { name: 'Torta Bauru', category: 'Tortas salgadas', price: 110.00 },
    { name: 'Torta de morango', category: 'Tortas doces', price: 100.00, portions: 10 },
    { name: 'Torta de limão', category: 'Tortas doces', price: 85.00, portions: 10 },
    { name: 'Torta Maracolate', category: 'Tortas doces', price: 110.00, portions: 10 },
    { name: 'Torta holandesa', category: 'Tortas doces', price: 120.00, portions: 10 },
    { name: 'Torta banoffe', category: 'Tortas doces', price: 120.00, portions: 10 },
    { name: 'Doce de leite', category: 'Bolos recheados', price: 85.00, per_kg: true },
    { name: 'Doce de leite c/ coco', category: 'Bolos recheados', price: 90.00, per_kg: true },
    { name: 'Doce de leite c/ ameixa', category: 'Bolos recheados', price: 100.00, per_kg: true },
    { name: 'Creme com abacaxi', category: 'Bolos recheados', price: 90.00, per_kg: true },
    { name: 'Creme com pêssego', category: 'Bolos recheados', price: 90.00, per_kg: true },
    { name: 'Mousse de maracujá', category: 'Bolos recheados', price: 100.00, per_kg: true },
    { name: 'Mousse de chocolate', category: 'Bolos recheados', price: 105.00, per_kg: true },
    { name: 'Ninho com morangos', category: 'Bolos recheados', price: 110.00, per_kg: true },
    { name: 'Ninho com abacaxi', category: 'Bolos recheados', price: 105.00, per_kg: true },
    { name: 'Merengue', category: 'Bolos recheados', price: 95.00, per_kg: true },
    { name: 'Brigadeiro', category: 'Bolos recheados', price: 90.00, per_kg: true },
    { name: 'Prestígio', category: 'Bolos recheados', price: 90.00, per_kg: true },
    { name: 'Dois amores', category: 'Bolos recheados', price: 120.00, per_kg: true },
    { name: 'Massa branca a partir', category: 'Bolos recheados', price: 85.00, per_kg: true },
    { name: 'Massa de chocolate', category: 'Bolos recheados', price: 90.00, per_kg: true },
    { name: 'Pudim G', category: 'Outros', price: 90.00 },
    { name: 'Pudim M', category: 'Outros', price: 50.00 },
    { name: 'Sonhos', category: 'Outros', price: 8.00 },
    { name: 'Pão de mel', category: 'Outros', price: 9.00 },
    { name: 'Esfiha Carne - M', category: 'Esfiha', price: 5.00 },
    { name: 'Esfiha Carne c/ Muçarela - M', category: 'Esfiha', price: 6.00 },
    { name: 'Esfiha Calabresa c/ Cheddar - M', category: 'Esfiha', price: 6.00 },
    { name: 'Cuscuz Paulista - G', category: 'Cuscuz', price: 160.00, portions: 10, flavors: ['Sardinha'] },
    { name: 'Cuscuz Paulista - M', category: 'Cuscuz', price: 100.00, portions: 6, flavors: ['Sardinha'] },
];

const catClass = {
    'Pães caseiros': 'cat-paes',
    'Bolos simples': 'cat-bsimples',
    'Bolos vulcão': 'cat-bvulcao',
    'Tortas salgadas': 'cat-tsalgadas',
    'Tortas doces': 'cat-tdoces',
    'Bolos recheados': 'cat-brecheados',
    'Outros': 'cat-outros',
    'Esfiha': 'cat-esfiha',
    'Cuscuz': 'cat-cuscuz',
};

const categories = ['Todos', ...new Set(menuData.map(i => i.category))];
let active = 'Todos';

const filtersEl = document.getElementById('filters');
const gridEl = document.getElementById('grid');

function renderFilters() {
    filtersEl.innerHTML = '';
    categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (cat === active ? ' active' : '');
        btn.textContent = cat;
        btn.addEventListener('click', () => {
            active = cat;
            renderFilters();
            renderGrid();
        });
        filtersEl.appendChild(btn);
    });
}

function fmt(n) { return 'R$ ' + n.toFixed(2).replace('.', ','); }

function renderGrid() {
    const items = active === 'Todos' ? menuData : menuData.filter(i => i.category === active);
    if (!items.length) {
        gridEl.innerHTML = '<p class="empty">Nenhum item encontrado.</p>';
        return;
    }
    gridEl.innerHTML = items.map(item => {
        const cls = catClass[item.category] || '';
        const flavorsHtml = item.flavors?.length
            ? `<div class="flavors">${item.flavors.map(f => `<span class="flavor-pill">${f}</span>`).join('')}</div>`
            : '';
        const metaHtml = [
            item.per_kg ? '<span class="meta-tag">por quilo</span>' : '',
            item.portions ? `<span class="meta-tag">${item.portions} pedaços</span>` : '',
        ].join('');

        return `
        <article class="card ${cls}">
            <div>
                <p class="card-cat">${item.category}</p>
                <h3 class="card-name">${item.name}</h3>
                ${item.description ? `<p class="card-desc">${item.description}</p>` : ''}
                ${flavorsHtml}
            </div>
            <div class="card-footer">
                <p class="price"><span>R$</span>${item.price.toFixed(2).replace('.', ',')}</p>
                <div class="card-meta">${metaHtml}</div>
            </div>
        </article>`;
    }).join('');
}

renderFilters();
renderGrid();
</script>
</body>
</html>
